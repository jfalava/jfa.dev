    "oxfmt": "0.42.0"
    "oxlint": "1.57.0"
    "oxlint-tsgolint": "0.17.3"
    "typescript": "5.9.3"
    "vite": "8.0.2"
    "vitest": "4.1.1"
    "wrangler": "4.77.0"
  cloudflare:
    "@cloudflare/vite-plugin": "1.30.1"
    "@cloudflare/workers-types": "4.20260317.1"
  react-ui:
    "@base-ui/react": "1.3.0"
