    "@cloudflare/workers-types": "4.20260213.0"
  styling:
    "tailwindcss": "4.2.1"
    "tailwind-merge": "3.5.0"
    "tw-animate-css": "1.4.0"
    "@tailwindcss/vite": "4.2.1"
    "class-variance-authority": "0.7.1"
    "clsx": "2.1.1"
  backend:
    "hono": "4.11.9"
